{% extends "base.html" %}
{% block title %}Nouveau projet - figma-audit{% endblock %}

{% block content %}
<div class="page-header">
  <h2>Nouveau projet</h2>
  <p class="subtitle">Configurez un projet a auditer</p>
</div>

<div class="card" style="max-width: 600px;">
  <form method="POST" action="/projects/new">
    <div class="form-group">
      <label for="name">Nom du projet *</label>
      <input type="text" id="name" name="name" required placeholder="MedExchange">
    </div>
    <div class="form-group">
      <label for="figma_url">URL Figma</label>
      <input type="url" id="figma_url" name="figma_url" placeholder="https://www.figma.com/design/...">
    </div>
    <div class="form-group">
      <label for="app_url">URL de l'application</label>
      <input type="url" id="app_url" name="app_url" placeholder="https://myapp.example.com">
    </div>
    <div class="form-group">
      <label for="project_path">Chemin du code source</label>
      <input type="text" id="project_path" name="project_path" placeholder="~/dev/myproject">
    </div>
    <div class="form-group">
      <label for="output_dir">Repertoire de sortie</label>
      <input type="text" id="output_dir" name="output_dir" value="./output" placeholder="./output">
    </div>
    <div class="flex gap-1 mt-2">
      <button type="submit" class="btn btn-primary">Creer le projet</button>
      <a href="/" class="btn">Annuler</a>
    </div>
  </form>
</div>
{% endblock %}
