name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      reason:
        description: "Reason for manual run"
        required: false
        default: "manual"

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build sdist and wheel
        run: python -m build

      - name: Check distribution
        run: twine check dist/*

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        # --skip-existing: do not fail if this version was already uploaded
        # (e.g. a prior manual twine upload). Without this, re-running the
        # workflow for a release that already shipped would error out.
        # If TWINE_PASSWORD is empty, the step fails with a clear message
        # instead of uploading anonymously.
        run: |
          if [ -z "${TWINE_PASSWORD}" ]; then
            echo "::error::PYPI_API_TOKEN secret is not set in the repository."
            echo "Configure it at:"
            echo "  https://github.com/${GITHUB_REPOSITORY}/settings/secrets/actions"
            exit 1
          fi
          twine upload --skip-existing dist/*
